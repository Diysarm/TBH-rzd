name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/**"
      - "data/**"
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/**"
      - "data/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  qa:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Automated QA gate
        run: npm run qa

      - name: npm audit (high severity)
        run: npm audit --audit-level=high
        continue-on-error: true

  release-preview:
    needs: qa
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer (release layout)
        run: npm run dist

      - name: Verify bundled data ships in packaged resources
        shell: pwsh
        run: |
          $resourcesData = Join-Path $PWD "release/win-unpacked/resources/data"
          if (-not (Test-Path $resourcesData)) {
            throw "Expected bundled data at release/win-unpacked/resources/data"
          }
          $required = @(
            "box_types.json",
            "rune_box_cap.json",
            "rare_box_routes.json",
            "gamedata.json",
            "stage_boxes.json"
          )
          foreach ($file in $required) {
            $path = Join-Path $resourcesData $file
            if (-not (Test-Path $path)) {
              throw "Missing bundled data file: $path"
            }
          }

      - name: Publish PR preview pre-release (.exe direct download)
        id: preview_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $exe = Get-ChildItem release/*.exe | Select-Object -First 1
          if (-not $exe) { throw "No installer .exe found under app/release" }

          $tag = "preview-pr-${{ github.event.pull_request.number }}"
          $repo = "${{ github.repository }}"

          gh release delete $tag --repo $repo --yes 2>$null
          gh release create $tag $exe.FullName `
            --repo $repo `
            --prerelease `
            --title "PR #${{ github.event.pull_request.number }} preview" `
            --notes "Automated preview build from commit ${{ github.sha }}. Replaced on each CI run for this PR."

          $release = gh release view $tag --repo $repo --json assets | ConvertFrom-Json
          $asset = $release.assets | Where-Object { $_.name -like "*.exe" } | Select-Object -First 1
          if (-not $asset) {
            $names = ($release.assets | ForEach-Object { $_.name }) -join ", "
            throw "No .exe asset on release ${tag}. Found: ${names}"
          }

          $downloadUrl = $asset.browser_download_url
          if (-not $downloadUrl) { throw "Release asset has no browser_download_url" }

          "download_url=$downloadUrl" >> $env:GITHUB_OUTPUT
          "exe_name=$($exe.Name)" >> $env:GITHUB_OUTPUT
          "release_tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Upload unpacked tree for debugging
        uses: actions/upload-artifact@v5
        with:
          name: tbh-companion-unpacked-pr-${{ github.event.pull_request.number }}
          path: app/release/win-unpacked/**
          if-no-files-found: error
          retention-days: 14

      - name: Write job summary
        if: success()
        shell: pwsh
        run: |
          @"
          ## Windows release preview

          | | |
          |---|---|
          | Installer | [**${{ steps.preview_release.outputs.exe_name }}**](${{ steps.preview_release.outputs.download_url }}) |
          | Pre-release tag | ``${{ steps.preview_release.outputs.release_tag }}`` |
          | Unpacked app | Download the \`tbh-companion-unpacked-pr-*\` artifact (zip) from this run |

          The installer link downloads the \`.exe\` directly. Workflow artifacts are always served as zip archives by GitHub.
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Post release preview link on PR
        if: success()
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-identifier: release-preview-windows
          edit-mode: replace
          body: |
            ## Windows release preview

            CI built a release-style Windows installer for this PR.

            | | |
            |---|---|
            | **Installer (.exe)** | [**${{ steps.preview_release.outputs.exe_name }}**](${{ steps.preview_release.outputs.download_url }}) |
            | Pre-release | [`${{ steps.preview_release.outputs.release_tag }}`](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.preview_release.outputs.release_tag }}) |
            | Unpacked tree | [Workflow artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) (`tbh-companion-unpacked-pr-${{ github.event.pull_request.number }}`, zip) |

            The installer link downloads the `.exe` file directly. GitHub workflow artifacts are always zipped — use the pre-release link above for one-click installer testing.

            _Updated from [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})._
